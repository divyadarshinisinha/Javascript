<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Heading</title>

    <style>
        #heading {
            color: red;
        }

        #para {
            color: green;
        }
    </style>
</head>

<body>

    <h1 id="heading"></h1>
    <p id="para"></p>


    <script>
        document.getElementById("heading").innerHTML = "This is a heading";
        document.getElementById("para").innerHTML = "This is a paragraph";
    </script>

</body>

</html>
