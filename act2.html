<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Datatypes</title>

    <style>
        .box {
            padding: 10px 12px;
            border: 1px solid rgb(0, 0, 0);
            border-radius: 10px;
            box-shadow: 0px 0px 10px 0px rgb(0, 0, 0);
            border: 4px solid white;
        }

        #display1 {
            background-color: rgb(255, 0, 0);
        }

        #display2 {
            background-color: rgb(0, 255, 0);
        }

        #display3 {
            background-color: rgb(0, 0, 255);
        }

        #display4 {
            background-color: rgb(255, 0, 255);
        }
    </style>
</head>

<body>

    <p id="demo1">5</p>
    <p id="display1" class="box"></p>

    <p id="demo2">True</p>
    <p id="display2" class="box"></p>

    <p id="demo3">"Hello World"</p>
    <p id="display3" class="box"></p>

    <p id="demo4">[1,2,3,4]</p>
    <p id="display4" class="box"></p>

    <script>

        document.getElementById("display1").innerHTML = typeof 5;
        document.getElementById("display2").innerHTML = typeof true;
        document.getElementById("display3").innerHTML = typeof "HelloWorld";
        document.getElementById("display4").innerHTML = typeof [1, 2, 3, 4];
    </script>
</body>

</html>
